<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image · xy</title>
    <style>
        /* ─── Reset & base ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f3f6;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 1.5rem;
        }

        .card {
            max-width: 720px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.18),
                0 8px 24px -6px rgba(0, 0, 0, 0.06);
            padding: 2rem 2rem 2.25rem;
            transition: box-shadow 0.25s ease;
        }

        .card:hover {
            box-shadow: 0 28px 52px -14px rgba(0, 0, 0, 0.22),
                0 10px 28px -8px rgba(0, 0, 0, 0.07);
        }

        /* ─── Header ─── */
        .header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            margin-bottom: 1.25rem;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #111;
        }

        .header .badge {
            font-size: 0.8rem;
            font-weight: 500;
            background: #eaeef3;
            color: #2a3b4c;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            letter-spacing: 0.01em;
            font-variant-numeric: tabular-nums;
        }

        /* ─── Image wrapper ─── */
        .image-wrapper {
            position: relative;
            background: #f8fafc;
            border-radius: 1.25rem;
            overflow: hidden;
            border: 1px solid #e9edf2;
            margin-bottom: 1.5rem;
        }

        .image-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: #eef1f5;
            transition: filter 0.2s;
        }

        /* subtle overlay hint */
        .image-wrapper .filename-hint {
            position: absolute;
            bottom: 0.75rem;
            right: 0.75rem;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 450;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            letter-spacing: 0.02em;
            pointer-events: none;
            user-select: none;
            font-variant-numeric: tabular-nums;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ─── Download area ─── */
        .download-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .download-area .info {
            font-size: 0.9rem;
            color: #3d4e62;
        }

        .download-area .info strong {
            font-weight: 600;
            color: #0b1a2a;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: #0b1f33;
            color: #fff;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 10px -4px rgba(0, 20, 40, 0.25);
            text-decoration: none;
            line-height: 1.4;
        }

        .btn-download:hover {
            background: #143450;
            box-shadow: 0 8px 18px -6px rgba(0, 20, 40, 0.35);
            transform: translateY(-1px);
        }

        .btn-download:active {
            transform: scale(0.97);
            background: #0a1a2b;
            box-shadow: 0 2px 6px -2px rgba(0, 0, 0, 0.25);
        }

        .btn-download svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* ─── Footer ─── */
        .footer {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #7a8a9e;
            border-top: 1px solid #eef2f6;
            padding-top: 1.25rem;
            text-align: center;
            letter-spacing: 0.01em;
        }

        .footer a {
            color: #2d4c6a;
            text-decoration: none;
            font-weight: 450;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* ─── responsive ─── */
        @media (max-width: 480px) {
            .card {
                padding: 1.25rem;
            }

            .header h1 {
                font-size: 1.35rem;
            }

            .download-area {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-download {
                justify-content: center;
                padding: 0.75rem 1.5rem;
            }

            .image-wrapper .filename-hint {
                bottom: 0.5rem;
                right: 0.5rem;
                font-size: 0.65rem;
                padding: 0.2rem 0.6rem;
            }
        }
    </style>
</head>

<body>

    <div class="card" role="main" aria-label="Image host">

        <!-- header -->
        <div class="header">
            <h1>📷 xy</h1>
            <span class="badge">PNG · 1200×675</span>
        </div>

        <!-- image -->
        <div class="image-wrapper">
            <!--
            The image is served from picsum.photos as a placeholder.
            The "id" is fixed so the image stays consistent.
            The filename in the download is forced to "xy.png".
            -->
            <img
            id="hostedImage"
            src="https://picsum.photos/id/1015/800/450"
            alt="A scenic placeholder image named xy"
            loading="lazy"
            />
            <span class="filename-hint">xy.png</span>
        </div>

        <!-- download section -->
        <div class="download-area">
            <div class="info">
                <strong>xy.png</strong> &nbsp;·&nbsp; 1.2 MB
            </div>

            <button class="btn-download" id="downloadBtn" aria-label="Download image xy">
                <!-- download icon -->
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
                </svg>
                Download
            </button>
        </div>

        <!-- footer -->
        <div class="footer">
            <span>Image hosted as <strong>xy</strong> &nbsp;·&nbsp; </span>
            <span>click the button to save it locally</span>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const img = document.getElementById('hostedImage');
            const downloadBtn = document.getElementById('downloadBtn');

            // ─── Core download function ──────────────────────────────────────
            async function downloadImage() {
                // Disable button while fetching to prevent multiple clicks
                downloadBtn.disabled = true;
                downloadBtn.textContent = 'Downloading…';

                try {
                    // 1) Fetch the image as a blob
                    const response = await fetch(img.src, {
                        mode: 'cors', // required for picsum
                        cache: 'force-cache',
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error ${response.status}`);
                    }

                    const blob = await response.blob();

                    // 2) Determine a good file name
                    //    We always want "xy.png" — but if the image is JPEG,
                    //    we keep the correct extension so the file is viewable.
                    const contentType = blob.type || 'image/png';
                    let ext = 'png';
                    if (contentType.includes('jpeg') || contentType.includes('jpg')) {
                        ext = 'jpg';
                    } else if (contentType.includes('gif')) {
                        ext = 'gif';
                    } else if (contentType.includes('webp')) {
                        ext = 'webp';
                    } else if (contentType.includes('svg')) {
                        ext = 'svg';
                    } else {
                        // fallback: keep .png for unknown
                        ext = 'png';
                    }

                    const fileName = `xy.${ext}`;

                    // 3) Create object URL and trigger download
                    const url = URL.createObjectURL(blob);

                    const link = document.createElement('a');
                    link.href = url;
                    link.download = fileName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    // 4) Clean up the object URL after a short delay
                    setTimeout(() => {
                        URL.revokeObjectURL(url);
                    }, 5000);

                } catch (error) {
                    console.error('Download failed:', error);
                    alert('Could not download the image. Please try again later.');
                } finally {
                    // Re-enable the button
                    downloadBtn.disabled = false;
                    downloadBtn.innerHTML = `
                <svg viewBox="0 0 24 24" width="20" height="20" style="fill:currentColor;flex-shrink:0">
                  <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
                </svg>
                Download
              `;
                }
            }

            // ─── Attach event ──────────────────────────────────────────────────
            downloadBtn.addEventListener('click', downloadImage);

            // ─── (optional) keyboard support ──────────────────────────────────
            downloadBtn.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    downloadBtn.click();
                }
            });

            // ─── If the image fails to load, show a fallback message ────────
            img.addEventListener('error', () => {
                img.alt = 'Image failed to load — but you can still try downloading.';
                img.style.background = '#e6eaef';
                img.style.minHeight = '180px';
            });

        })();
    </script>

</body>
</html>
